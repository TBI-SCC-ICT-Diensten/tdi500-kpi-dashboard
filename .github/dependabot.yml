# Dependabot configuration — opens automated dependency-update PRs.
# Dependabot reads this from the repository's DEFAULT branch (main).
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # JavaScript / TypeScript dependencies (root package.json + package-lock.json)
  - package-ecosystem: "npm"
    directory: "/"
    # Open version-update PRs against develop (not the default branch main),
    # so routine dependency bumps follow the develop -> main release flow.
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      # Bundle all minor + patch bumps into ONE weekly PR to keep review
      # noise low. Major bumps still arrive as separate PRs so potential
      # breaking changes stay visible.
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    # Suppress ROUTINE major-version bumps of the core stack — we do these as
    # deliberate, separate migrations (one library at a time), not weekly bulk.
    # Security updates are NOT affected by version-update ignores, so real
    # vulnerability PRs still surface.
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@mui/material"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@mui/icons-material"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-router-dom"
        update-types: ["version-update:semver-major"]

  # When a CI workflow is added (see verbetervoorstel VV-27), enable
  # GitHub Actions updates too by uncommenting the block below:
  # - package-ecosystem: "github-actions"
  #   directory: "/"
  #   schedule:
  #     interval: "weekly"
